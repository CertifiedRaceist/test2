<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Awizacje DPH</title>

<style>
:root{
  --bg:#0b0e14;
  --bg-soft:#11151f;
  --card:#151a26;
  --border:rgba(255,255,255,.08);
  --text:#ffffff;
  --muted:#a0a6b8;
  --accent:#4f7cff;
  --ok:#2ecc71;
  --err:#ff5c5c;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--text);
}
.card{
  width:100%;
  max-width:720px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:36px;
}
.field{margin-bottom:18px}
label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px}
input,select{
  width:100%;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  color:var(--text);
  font-size:.95rem;
}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.actions{margin-top:26px;display:flex;gap:14px}
button{
  cursor:pointer;
  border-radius:12px;
  padding:14px 22px;
  font-size:1rem;
}
.primary{
  flex:1;
  background:transparent;
  color:var(--text);
  border:1px solid var(--accent);
}
.secondary{
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border);
}
.status{
  margin-top:20px;
  padding:14px 16px;
  border-radius:10px;
  display:none;
  font-size:.9rem;
}
.status.ok{display:block;background:rgba(46,204,113,.15);color:var(--ok)}
.status.err{display:block;background:rgba(255,92,92,.15);color:var(--err)}

input[type="date"]::-webkit-calendar-picker-indicator{
  filter: invert(48%) sepia(90%) saturate(400%) hue-rotate(190deg);
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>Awizacje DPH</h1>
  <p style="color:var(--muted)">Stwórz awizację / Create delivery notification</p>

  <hr style="margin:24px 0;border:0;border-top:1px solid var(--border)"/>

  <div class="field">
    <label>Dostawca / Supplier</label>
    <input id="dostawca">
  </div>

  <div class="row2">
    <div class="field">
      <label>Data dostawy / Delivery date</label>
      <input type="date" id="termin">
    </div>
    <div class="field">
      <label>Godzina / Time slot</label>
      <select id="godzina">
        <option value="">— wybierz —</option>
        <option>08:00</option><option>08:15</option><option>08:30</option><option>08:45</option>
        <option>09:00</option><option>09:15</option><option>09:30</option><option>09:45</option>
        <option>10:00</option><option>10:15</option><option>10:30</option><option>10:45</option>
        <option>11:00</option><option>11:15</option><option>11:30</option><option>11:45</option>
        <option>12:00</option><option>12:15</option><option>12:30</option><option>12:45</option>
        <option>13:00</option><option>13:15</option><option>13:30</option><option>13:45</option>
        <option>14:00</option><option>14:15</option><option>14:30</option><option>14:45</option>
        <option>15:00</option><option>15:15</option><option>15:30</option><option>15:45</option>
        <option>16:00</option><option>16:15</option><option>16:30</option><option>16:45</option>
        <option>17:00</option><option>17:15</option><option>17:30</option><option>17:45</option>
        <option>18:00</option><option>18:15</option><option>18:30</option><option>18:45</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Liczba palet / Number of pallets</label>
    <input type="number" id="palety" min="0" max="999" value="0">
  </div>

  <div class="field">
    <label>Informacja / Info</label>
    <select id="info">
      <option value="info 1">info 1</option>
      <option value="info 2">info 2</option>
      <option value="info 3">info 3</option>
    </select>
  </div>

  <div class="actions">
    <button class="primary" onclick="sendForm()">Potwierdź / Generate</button>
    <button class="secondary" onclick="setEndpoint()">⚙ Endpoint</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const KEY="awizacja_endpoint";
const status=document.getElementById("status");
termin.valueAsDate=new Date();

function setEndpoint(){
  const url=prompt("Endpoint URL:",localStorage.getItem(KEY)||"");
  if(url!==null){
    if(url.trim()) localStorage.setItem(KEY,url.trim());
    else localStorage.removeItem(KEY);
  }
}

function show(type,msg){
  status.className="status "+type;
  status.textContent=msg;
}

function toDDMMYYYY(iso){
  const [y,m,d]=iso.split("-");
  return `${d}-${m}-${y}`;
}

async function sendForm(){
  const ep=localStorage.getItem(KEY);
  if(!ep) return show("err","Brak endpointu");

  if(!dostawca.value.trim())
    return show("err","Podaj dostawcę");

  if(!termin.value)
    return show("err","Wybierz datę");

  if(!godzina.value)
    return show("err","Wybierz godzinę");

  if(palety.value < 0 || palety.value > 999)
    return show("err","Palety: 0–999");

  const data={
    dostawca: dostawca.value.trim().toUpperCase().replace(/\s+/g,"_"),
    termin: toDDMMYYYY(termin.value),
    godzina: godzina.value,
    palety: Number(palety.value),
    info: info.value
  };

  try{
    const r=await fetch(ep,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
    r.ok
      ? show("ok","✓ Awizacja wysłana")
      : show("err","✗ Błąd serwera");
  }catch{
    show("err","✗ Brak połączenia");
  }
}
</script>

</body>
</html>
