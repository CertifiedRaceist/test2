<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awizacje DPH</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --bg:#0b0e14;
  --bg-soft:#11151f;
  --card:#151a26;
  --border:rgba(255,255,255,.08);
  --text:#ffffff;
  --muted:#a0a6b8;
  --accent:#4f7cff;
  --ok:#2ecc71;
  --err:#ff5c5c;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--text);
}
.card{
  width:100%;
  max-width:720px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:36px;
}
.field{margin-bottom:18px}
label{
  display:block;
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:6px
}
input,select{
  width:100%;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  color:var(--text);
  font-size:.95rem;
}
.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px
}
button{
  width:100%;
  cursor:pointer;
  border-radius:12px;
  padding:14px;
  font-size:1rem;
  background:transparent;
  color:var(--text);
  border:1px solid var(--accent);
}
.status{
  margin-top:20px;
  padding:14px 16px;
  border-radius:10px;
  display:none;
  font-size:.9rem;
}
.status.ok{display:block;background:rgba(46,204,113,.15);color:var(--ok)}
.status.err{display:block;background:rgba(255,92,92,.15);color:var(--err)}
</style>
</head>

<body>

<div class="card">
  <h1>Awizacje DPH</h1>
  <p style="color:var(--muted)">Stwórz awizację / Create delivery notification</p>

  <hr style="margin:24px 0;border:0;border-top:1px solid var(--border)">

  <div class="field">
    <label>Dostawca / Supplier</label>
    <input id="supplier">
  </div>

  <div class="row2">
    <div class="field">
      <label>Data dostawy / Delivery date</label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label>Godzina / Time slot</label>
      <select id="hour">
        <option value="">— wybierz / select —</option>
        <option>08:00</option><option>08:15</option><option>08:30</option><option>08:45</option>
        <option>09:00</option><option>09:15</option><option>09:30</option><option>09:45</option>
        <option>10:00</option><option>10:15</option><option>10:30</option><option>10:45</option>
        <option>11:00</option><option>11:15</option><option>11:30</option><option>11:45</option>
        <option>12:00</option><option>12:15</option><option>12:30</option><option>12:45</option>
        <option>13:00</option><option>13:15</option><option>13:30</option><option>13:45</option>
        <option>14:00</option><option>14:15</option><option>14:30</option><option>14:45</option>
        <option>15:00</option><option>15:15</option><option>15:30</option><option>15:45</option>
        <option>16:00</option><option>16:15</option><option>16:30</option><option>16:45</option>
        <option>17:00</option><option>17:15</option><option>17:30</option><option>17:45</option>
        <option>18:00</option><option>18:15</option><option>18:30</option><option>18:45</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>
      Liczba palet (wpisz „-” jeśli nie dotyczy) <br>
      Number of pallets (type “-” if not applicable)
    </label>
    <input id="pallets" placeholder="-" value="-">
  </div>

  <div class="field">
    <label>Informacja / Information</label>
    <input id="info" maxlength="80">
  </div>

  <button onclick="generate()">Potwierdź / Generate</button>
  <div class="status" id="status"></div>
</div>

<div id="qr" style="display:none"></div>

<script>
date.valueAsDate = new Date();
const statusBox = document.getElementById("status");

/* ---------- SANITIZE ---------- */
function sanitizeSupplier(v){
  return v.toUpperCase().replace(/\s+/g,"_").replace(/[^A-Z0-9_]/g,"").slice(0,40);
}
function sanitizeInfo(v){
  return v.toUpperCase().replace(/\s+/g,"_").replace(/[^A-Z0-9_\/-]/g,"").slice(0,80);
}

/* ---------- BASE64 ENCODER ---------- */
function encodeDeliveryBase64(supplier, dateISO, hour, pallets, info){
  const supBytes = new TextEncoder().encode(sanitizeSupplier(supplier));
  const infBytes = new TextEncoder().encode(sanitizeInfo(info));
  const buf = new ArrayBuffer(1 + supBytes.length + 4 + 1 + 2 + 1 + infBytes.length);
  const view = new DataView(buf);
  let o = 0;

  view.setUint8(o++, supBytes.length);
  new Uint8Array(buf,o,supBytes.length).set(supBytes); o += supBytes.length;

  const epoch = new Date("1970-01-01");
  view.setUint32(o, Math.floor((new Date(dateISO)-epoch)/86400000)); o += 4;

  const [h,m] = hour.split(":").map(Number);
  view.setUint8(o++, ((h*60+m)-480)/15);

  view.setUint16(o, pallets === "-" ? 0 : Number(pallets)); o += 2;

  view.setUint8(o++, infBytes.length);
  new Uint8Array(buf,o,infBytes.length).set(infBytes);

  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

/* ---------- UI ---------- */
function show(type,msg){
  statusBox.className="status "+type;
  statusBox.textContent=msg;
}

function generate(){
  if(!supplier.value.trim())
    return show("err","Podaj dostawcę / Enter supplier");

  if(!date.value)
    return show("err","Wybierz datę / Select delivery date");

  if(!hour.value)
    return show("err","Wybierz godzinę / Select time slot");

  const palletsVal = pallets.value.trim();
  if(palletsVal !== "-" && !/^[1-9][0-9]*$/.test(palletsVal))
    return show(
      "err",
      "Palety: wpisz „-” lub liczbę ≥ 1 / Pallets: type “-” or number ≥ 1"
    );

  const payload = encodeDeliveryBase64(
    supplier.value, date.value, hour.value, palletsVal, info.value
  );

  document.getElementById("qr").innerHTML="";
  new QRCode(document.getElementById("qr"),{text:payload,width:200,height:200});

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  pdf.setFontSize(16);
  pdf.text("AWIZACJA DOSTAWY / DELIVERY NOTIFICATION",20,20);
  pdf.setFontSize(12);
  pdf.text("Supplier: "+sanitizeSupplier(supplier.value),20,35);
  pdf.text("Date: "+date.value,20,45);
  pdf.text("Time: "+hour.value,20,55);
  pdf.text("Pallets: "+palletsVal,20,65);
  pdf.text("Info: "+sanitizeInfo(info.value),20,75);

  pdf.text("DPH Code:",20,90);
  pdf.setFont("courier","normal");
  pdf.text(payload,20,100,{maxWidth:170});

  const canvas = document.querySelector("#qr canvas");
  pdf.addImage(canvas.toDataURL("image/png"),"PNG",60,135,90,90);

  pdf.save("awizacja_dostawy_delivery_notification.pdf");
  show("ok","✓ Awizacja wygenerowana / ✓ Notification generated");
}
</script>

</body>
</html>
