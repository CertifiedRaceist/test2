<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awizacje DPH</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --bg:#0b0e14; --bg2:#11151f; --card:#151a26;
  --border:rgba(255,255,255,.08);
  --text:#fff; --muted:#a0a6b8;
  --ok:#2ecc71; --err:#ff5c5c;
  --accent:#4f7cff;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; display:flex;
  align-items:center; justify-content:center;
  background:var(--bg); color:var(--text);
  font-family:system-ui,Segoe UI,Roboto,sans-serif;
}
.card{
  width:100%; max-width:720px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:36px;
}
.field{margin-bottom:18px}
label{display:block;color:var(--muted);margin-bottom:6px;font-size:.85rem}
input,select{
  width:100%; padding:14px 16px;
  background:var(--bg2); color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
button{
  width:100%; padding:14px;
  background:transparent;
  color:var(--text);
  border:1px solid var(--accent);
  border-radius:12px;
  cursor:pointer;
}
.status{
  margin-top:20px; padding:14px;
  border-radius:10px; display:none;
}
.status.ok{display:block;background:rgba(46,204,113,.15);color:var(--ok)}
.status.err{display:block;background:rgba(255,92,92,.15);color:var(--err)}
</style>
</head>

<body>

<div class="card">
  <h1>Awizacje DPH</h1>
  <p style="color:var(--muted)">Stwórz awizację / Create delivery notification</p>

  <hr style="margin:24px 0;border:0;border-top:1px solid var(--border)">

  <div class="field">
    <label>Dostawca / Supplier</label>
    <input id="supplier">
  </div>

  <div class="row2">
    <div class="field">
      <label>Data dostawy / Delivery date</label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label>Godzina / Time slot</label>
      <select id="hour">
        <option value="">— wybierz —</option>
        <option>08:00</option><option>08:15</option><option>08:30</option><option>08:45</option>
        <option>09:00</option><option>09:15</option><option>09:30</option><option>09:45</option>
        <option>10:00</option><option>10:15</option><option>10:30</option><option>10:45</option>
        <option>11:00</option><option>11:15</option><option>11:30</option><option>11:45</option>
        <option>12:00</option><option>12:15</option><option>12:30</option><option>12:45</option>
        <option>13:00</option><option>13:15</option><option>13:30</option><option>13:45</option>
        <option>14:00</option><option>14:15</option><option>14:30</option><option>14:45</option>
        <option>15:00</option><option>15:15</option><option>15:30</option><option>15:45</option>
        <option>16:00</option><option>16:15</option><option>16:30</option><option>16:45</option>
        <option>17:00</option><option>17:15</option><option>17:30</option><option>17:45</option>
        <option>18:00</option><option>18:15</option><option>18:30</option><option>18:45</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Liczba palet / Number of pallets</label>
    <input type="number" id="pallets" min="0" max="999" value="0">
  </div>

  <div class="field">
    <label>Informacja / Info (max 80 chars)</label>
    <input id="info" maxlength="80">
  </div>

  <button onclick="generate()">Potwierdź / Generate</button>

  <div class="status" id="status"></div>
</div>

<div id="qr" style="display:none"></div>

<script>
date.valueAsDate = new Date();
const statusBox = document.getElementById("status");

function show(type,msg){
  statusBox.className="status "+type;
  statusBox.textContent=msg;
}

function encodeDeliveryBase64(supplier, dateISO, hour, pallets, info){
  const buf = new ArrayBuffer(40+4+1+2+80);
  const view = new DataView(buf);
  let o=0;

  const sup = new TextEncoder().encode(
    supplier.toUpperCase().replace(/\s+/g,"_")
  ).slice(0,40);
  new Uint8Array(buf,o,40).set(sup); o+=40;

  const epoch = new Date("1970-01-01");
  const days = Math.floor((new Date(dateISO)-epoch)/86400000);
  view.setUint32(o,days); o+=4;

  const [h,m]=hour.split(":").map(Number);
  const slot=((h*60+m)-480)/15;
  view.setUint8(o,slot); o+=1;

  view.setUint16(o,pallets===0?0:pallets); o+=2;

  const infoBytes=new TextEncoder().encode(info).slice(0,80);
  new Uint8Array(buf,o,80).set(infoBytes);

  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

function generate(){
  if(!supplier.value.trim()) return show("err","Podaj dostawcę");
  if(!date.value) return show("err","Wybierz datę");
  if(!hour.value) return show("err","Wybierz godzinę");

  const palletsVal=Number(pallets.value);
  if(palletsVal<0||palletsVal>999) return show("err","Palety 0–999");

  const payload = encodeDeliveryBase64(
    supplier.value,
    date.value,
    hour.value,
    palletsVal,
    info.value||""
  );

  document.getElementById("qr").innerHTML="";
  new QRCode(document.getElementById("qr"),{text:payload,width:200,height:200});

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();
  pdf.setFontSize(16);
  pdf.text("AWIZACJA DOSTAWY / DELIVERY NOTIFICATION",20,20);
  pdf.setFontSize(12);
  pdf.text("Supplier: "+supplier.value,20,35);
  pdf.text("Date: "+date.value,20,45);
  pdf.text("Time: "+hour.value,20,55);
  pdf.text("Pallets: "+(palletsVal===0?"-":palletsVal),20,65);
  pdf.text("DPH Code:",20,80);
  pdf.setFont("courier","normal");
  pdf.text(payload,20,90,{maxWidth:170});

  const canvas=document.querySelector("#qr canvas");
  pdf.addImage(canvas.toDataURL("image/png"),"PNG",60,130,90,90);
  pdf.save("awizacja_dostawy_delivery_notification.pdf");

  show("ok","✓ Awizacja wygenerowana / PDF downloaded");
}
</script>

</body>
</html>
