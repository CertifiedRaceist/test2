<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awizacje DPH</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --bg:#0b0e14;
  --bg-soft:#11151f;
  --card:#151a26;
  --border:rgba(255,255,255,.08);
  --text:#ffffff;
  --muted:#a0a6b8;
  --accent:#4f7cff;
  --ok:#2ecc71;
  --err:#ff5c5c;
  --shadow:0 8px 24px rgba(0,0,0,.35);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--text);
}

/* ===== LAYOUT ===== */

.wrapper{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns: 0.9fr 2.1fr; /* ~30 / 70 */
  gap:24px;
}

@media (max-width: 900px){
  .wrapper{
    grid-template-columns:1fr;
  }
}

/* ===== CARDS ===== */

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  box-shadow:var(--shadow);
}

/* ===== LEFT INFO ===== */

.info-title{
  font-size:1.15rem;
  margin-bottom:14px;
}

.info-list{
  padding-left:18px;
}

.info-list li{
  margin-bottom:14px;
  line-height:1.45;
}

.info-muted{
  color:var(--muted);
  font-size:.9rem;
}

.info-img{
  margin-top:18px;
  text-align:center;
}


info-img img{
  width:96%;
  max-width:260px;
  border-radius:14px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  background:#fff;
  padding:10px;
}


/* ===== FORM ===== */

.field{margin-bottom:18px}

label{
  display:block;
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:6px;
}

input,select{
  width:100%;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  color:var(--text);
  font-size:.95rem;
}

.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

button{
  width:100%;
  padding:14px;
  background:transparent;
  color:var(--text);
  border:1px solid var(--accent);
  border-radius:12px;
  cursor:pointer;
}

.lang-btn{
  width:auto;
  padding:6px 10px;
  font-size:.8rem;
  margin-bottom:10px;
}

.status{
  margin-top:20px;
  padding:14px;
  border-radius:10px;
  display:none;
}

.status.ok{display:block;background:rgba(46,204,113,.15);color:var(--ok)}
.status.err{display:block;background:rgba(255,92,92,.15);color:var(--err)}
</style>
</head>

<body>

<div class="wrapper">

  <!-- ===== LEFT INFO ===== -->
  <div class="card">
    <div class="info-title">Informacje / Information</div>

    <ul class="info-list">
      <li>
        <b>Finalna data i godzina rozładunku</b> zostaną podane przez <b>DELPHARM</b><br>
        <span class="info-muted">
          Final unloading date and time will be provided by <b>DELPHARM</b>
        </span>
      </li>

      <li>
        <b>Przyjmujemy tylko europalety</b><br>
        <span class="info-muted">
          We accept <b>EUR / EPAL pallets only</b>
        </span>
      </li>
    </ul>

    <div class="info-img">
      <img src="epal.png" alt="EPAL pallet">
    </div>
  </div>

  <!-- ===== RIGHT FORM ===== -->
  <div class="card">

    <div style="text-align:right">
      <button class="lang-btn" id="langToggle" onclick="toggleLang()">EN</button>
    </div>

    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle" style="color:var(--muted)"></p>

    <hr style="margin:24px 0;border:0;border-top:1px solid var(--border)">

    <div class="field">
      <label data-i18n="supplier"></label>
      <input id="supplier">
    </div>

    <div class="row2">
      <div class="field">
        <label data-i18n="date"></label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label data-i18n="hour"></label>
        <select id="hour">
          <option value="">—</option>
          <option>08:00</option><option>08:15</option><option>08:30</option><option>08:45</option>
          <option>09:00</option><option>09:15</option><option>09:30</option><option>09:45</option>
          <option>10:00</option><option>10:15</option><option>10:30</option><option>10:45</option>
          <option>11:00</option><option>11:15</option><option>11:30</option><option>11:45</option>
          <option>12:00</option><option>12:15</option><option>12:30</option><option>12:45</option>
          <option>13:00</option><option>13:15</option><option>13:30</option><option>13:45</option>
          <option>14:00</option><option>14:15</option><option>14:30</option><option>14:45</option>
          <option>15:00</option><option>15:15</option><option>15:30</option><option>15:45</option>
          <option>16:00</option><option>16:15</option><option>16:30</option><option>16:45</option>
          <option>17:00</option><option>17:15</option><option>17:30</option><option>17:45</option>
          <option>18:00</option><option>18:15</option><option>18:30</option><option>18:45</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label data-i18n="pallets"></label>
      <input id="pallets" value="-" placeholder="-">
    </div>

    <div class="field">
      <label data-i18n="info"></label>
      <input id="info" maxlength="80">
    </div>

    <button onclick="generate()" data-i18n="generate"></button>
    <div class="status" id="status"></div>
  </div>

</div>

<script>
let lang="pl";
const statusBox=document.getElementById("status");

const I18N={
  pl:{
    title:"Awizacje DPH",
    subtitle:"Stwórz awizację",
    supplier:"Dostawca",
    date:"Data dostawy",
    hour:"Godzina",
    pallets:"Liczba palet (wpisz „-” jeśli nie dotyczy)",
    info:"Informacja",
    generate:"Potwierdź",
    ok:"✓ Awizacja wygenerowana",
    err_supplier:"Podaj dostawcę",
    err_date:"Wybierz datę",
    err_hour:"Wybierz godzinę",
    err_pallets:"Palety: wpisz „-” lub liczbę ≥ 1"
  },
  en:{
    title:"DPH Notifications",
    subtitle:"Create delivery notification",
    supplier:"Supplier",
    date:"Delivery date",
    hour:"Time slot",
    pallets:"Number of pallets (type “-” if not applicable)",
    info:"Information",
    generate:"Generate",
    ok:"✓ Notification generated",
    err_supplier:"Enter supplier",
    err_date:"Select delivery date",
    err_hour:"Select time slot",
    err_pallets:"Pallets: type “-” or number ≥ 1"
  }
};

function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent=I18N[lang][el.dataset.i18n];
  });
  document.getElementById("langToggle").textContent=lang==="pl"?"EN":"PL";
}
function toggleLang(){lang=lang==="pl"?"en":"pl";applyLang();}
applyLang();

function show(type,msg){
  statusBox.className="status "+type;
  statusBox.textContent=msg;
}

function generate(){
  if(!supplier.value.trim()) return show("err",I18N[lang].err_supplier);
  if(!date.value) return show("err",I18N[lang].err_date);
  if(!hour.value) return show("err",I18N[lang].err_hour);

  const p=pallets.value.trim();
  if(p!=="-" && !/^[1-9][0-9]*$/.test(p))
    return show("err",I18N[lang].err_pallets);

  show("ok",I18N[lang].ok);
}
</script>

</body>
</html>
